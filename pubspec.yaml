name: resep_kita
description: Aplikasi resep masakan Indonesia

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # Networking & Storage
  http: ^1.2.0
  shared_preferences: ^2.2.2

  # UI
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1

  # State Management
  provider: ^6.1.1

  # Camera & Image
  image_picker: ^1.0.7

  # Firebase
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # External Links
  url_launcher: ^6.3.1

  # Payment
  midtrans_sdk: ^1.2.0
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^17.2.2
  firebase_auth: ^5.0.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true